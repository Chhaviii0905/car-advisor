version: "3.9"

services:

  backend:
    build:
      context: ./backend/CarAdvisor/CarAdvisor.API
    container_name: caradvisor-api

    ports:
      - "5005:8080"

  frontend:
    build:
      context: ./frontend/car-advisor-ui
    container_name: caradvisor-ui

    ports:
      - "4200:4200"

    depends_on:
      - backend